server:
  port: 8080

spring:
  application:
    name: otus-backend
  security:
    user:
      name: test
      password: ${ADMIN_PASSWORD:test}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  server:
    port: 8081
    address: 0.0.0.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    git:
      mode: simple
    build:
      enabled: true
