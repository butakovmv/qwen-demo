services:
  postgres:
    image: postgres:16-alpine
    container_name: aidemo-postgres
    environment:
      - POSTGRES_DB=aidemo
      - POSTGRES_USER=aidemo
      - POSTGRES_PASSWORD=aidemo
    ports:
      - "83:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidemo"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - aidemo-net
      
  backend:
    build: ./app
    container_name: aidemo-backend
    ports:
      - "81:8080"
      - "82:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=pg
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgres:5432/aidemo
      - SPRING_R2DBC_USERNAME=aidemo
      - SPRING_R2DBC_PASSWORD=aidemo
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aidemo-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    develop:
      watch:
        - path: ./app/build/libs/app-0.0.1-SNAPSHOT.jar
          target: /app/app.jar
          action: sync+restart
        - path: ./app/build/libs/lib/
          target: /app/lib/
          action: sync

  frontend:
    build: ./front
    container_name: aidemo-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - aidemo-net
    develop:
      watch:
        - path: ./front/dist
          target: /usr/share/nginx/html
          action: sync
        - path: ./front/nginx.conf
          target: /etc/nginx/conf.d/default.conf
          action: sync+restart

  smoke-test:
    build: ./ui-test
    container_name: aidemo-smoke-test
    restart: "no"
    environment:
      - BASE_URL=http://frontend
      - BACKEND_URL=http://backend:8080
      - MANAGEMENT_URL=http://backend:8081
      - ADMIN_USER=test
      - ADMIN_PASSWORD=test
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - aidemo-net
    develop:
      watch:
        - path: ./ui-test/tests
          target: /app/tests/
          action: sync+restart

networks:
  aidemo-net:
    driver: bridge

volumes:
  postgres-data:
