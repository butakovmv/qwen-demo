services:
  backend:
    build: ./app
    container_name: aidemo-backend
    ports:
      - "81:8080"
      - "82:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - aidemo-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    develop:
      watch:
        - path: ./app/build/libs/app-0.0.1-SNAPSHOT.jar
          target: /app/app.jar
          action: sync+restart

  frontend:
    build: ./front
    container_name: aidemo-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - aidemo-net
    develop:
      watch:
        - path: ./front/dist
          target: /usr/share/nginx/html
          action: sync
        - path: ./front/nginx.conf
          target: /etc/nginx/conf.d/default.conf
          action: sync+restart

  smoke-test:
    build: ./ui-test
    container_name: aidemo-smoke-test
    restart: "no"
    environment:
      - BASE_URL=http://frontend
      - BACKEND_URL=http://backend:8080
      - MANAGEMENT_URL=http://backend:8081
      - ADMIN_USER=test
      - ADMIN_PASSWORD=test
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - aidemo-net
    develop:
      watch:
        - path: ./ui-test/tests
          target: /app/tests/
          action: sync+restart

networks:
  aidemo-net:
    driver: bridge
