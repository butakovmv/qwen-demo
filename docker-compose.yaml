services:
  backend:
    build: ./app
    container_name: aidemo-backend
    ports:
      - "81:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - aidemo-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    develop:
      watch:
        - path: ./app/build/libs
          target: /app/app.jar
          action: sync+restart

  frontend:
    build: ./front
    container_name: aidemo-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - aidemo-net

  smoke-test:
    build: ./ui-test
    container_name: aidemo-smoke-test
    environment:
      - BASE_URL=http://frontend
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - aidemo-net

networks:
  aidemo-net:
    driver: bridge
